<!DOCTYPE html>
<html lang="ko">
<head><script>window.onerror=function(m,s,l,c,e){fetch('http://localhost:8000/err?m='+encodeURIComponent(m));}</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Merge Game</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <div id="game-container">
        <div id="ui-layer">
            <div id="score-board">Score: <span id="score">0</span></div>
            <div id="best-score">Best: <span id="best">0</span></div>
        </div>
        <div id="skills-layer">
            <button id="skill-extend-btn" class="skill-btn" title="벽 연장 (게임당 1회)">
                <span id="skill-extend-timer" class="skill-timer hidden">20</span>
                <svg width="40" height="40" viewBox="0 0 100 100">
                    <path d="M 25 90 L 75 90 L 85 50 M 25 90 L 15 50" stroke="black" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M 15 50 L 5 10 M 85 50 L 95 10" stroke="black" stroke-width="8" stroke-dasharray="10 10" fill="none" stroke-linecap="round"/>
                    <path d="M 0 25 L 5 10 L 15 15 M 85 15 L 95 10 L 100 25" stroke="black" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button id="skill-delete-btn" class="skill-btn" title="젤리 삭제 (게임당 1회)">
                <svg width="40" height="40" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="30" fill="#f25e5e" stroke="black" stroke-width="6"/>
                    <circle cx="40" cy="45" r="6" fill="white" stroke="black" stroke-width="2"/>
                    <circle cx="60" cy="45" r="6" fill="white" stroke="black" stroke-width="2"/>
                    <circle cx="41" cy="45" r="3" fill="black"/>
                    <circle cx="59" cy="45" r="3" fill="black"/>
                    <path d="M 45 55 Q 50 60 55 55" stroke="black" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <path d="M 20 20 L 80 80 M 80 20 L 20 80" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
                    <path d="M 20 20 L 80 80 M 80 20 L 20 80" stroke="#ff0000" stroke-width="10" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>Game Over</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Restart</button>
        </div>
    </div>
    
    <!-- Matter.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="main.js?v=1.1"></script>
</body>
</html>
